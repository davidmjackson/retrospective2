<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actions Report</title>
    <link rel="stylesheet" href="vendor/dragula/dragula.min.css" />
    <link rel="stylesheet" href="/css/theme-core.css" />
    <link rel="stylesheet" href="/css/theme-retro.css" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/breathing-waves.css" />
  </head>
  <body class="page actions-page">
    <header class="topbar">
      <span class="topbar-lead">
        <a class="back-link" href="/lobby">Back to Lobby</a>
        <p class="brand">
          <svg class="brand-glyph" aria-hidden="true"><use href="/illos/theme-illos.svg#pin"/></svg>
          <span>Retrospective</span>
        </p>
      </span>
      <div class="header-actions">
        <div class="status-pill" id="actions-count">Loading actions...</div>
      </div>
    </header>

    <header class="header-band" data-breathing-waves data-wave-palette="retro" role="none">
      <canvas></canvas>
      <div class="header-content">
        <p class="eyebrow">Report</p>
        <h1 class="header-title">Actions Report</h1>
        <p class="header-subtitle">Track actions across every team and retrospective.</p>
      </div>
    </header>

    <main class="page-content">
      <section class="instruction-banner actions-summary">
        <p>Review action items by status and keep ownership visible across the team.</p>
        <a class="secondary-btn" href="/lobby">Back to Lobby</a>
      </section>
      <section class="actions-board" id="actions-board"></section>
    </main>

    <script src="vendor/dragula/dragula.min.js"></script>
    <script src="actions.js"></script>
    <script src="breathing-waves.js"></script>
  </body>
</html>
