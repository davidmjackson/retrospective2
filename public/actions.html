<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Actions Report</title>
    <link rel="stylesheet" href="vendor/dragula/dragula.min.css" />
    <link rel="stylesheet" href="/css/instrument-core.css" />
    <link rel="stylesheet" href="/css/retro.css" />
  </head>
  <body class="ins actions-page" data-app="retro">
    <header class="topbar">
      <span class="topbar-lead">
        <a class="back-link" href="/lobby">Back to Lobby</a>
        <p class="brand">
          <svg class="mk" width="22" height="22" aria-hidden="true"><use href="/illos/glyphs.svg#glyph-retro"/></svg>
          <span>Retrospective</span>
        </p>
      </span>
      <div class="header-actions">
        <div class="status-pill" id="actions-count">Loading actions...</div>
      </div>
    </header>

    <div class="band"><div class="waves"></div><div class="band-in">
      <div class="eyebrow">Report</div>
      <h1>Actions Report</h1>
      <p class="sub">Track actions across every team and retrospective.</p>
    </div></div>

    <main class="page-content">
      <section class="instruction-banner actions-summary">
        <p>Review action items by status and keep ownership visible across the team.</p>
        <a class="secondary-btn" href="/lobby">Back to Lobby</a>
      </section>
      <section class="actions-board" id="actions-board"></section>
    </main>

    <footer class="app-footer"><a href="/license">License</a></footer>
    <script src="vendor/dragula/dragula.min.js"></script>
    <script src="actions.js"></script>
    <script type="module" src="/js/oscilloscope.js"></script>
    <script src="/auth-client/heartbeat.js"></script>
  </body>
</html>
