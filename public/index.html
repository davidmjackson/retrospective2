<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retrospective Board</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/dragula@3.7.3/dist/dragula.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="login" id="login">
      <form id="login-form">
        <div>
          <h2>Join the Retro</h2>
          <p>Enter your name and choose a role.</p>
        </div>
        <input
          id="login-name"
          type="text"
          placeholder="Your name"
          required
        />
        <select id="login-role">
          <option value="participant">Participant</option>
          <option value="facilitator">Facilitator</option>
        </select>
        <button type="submit">Enter</button>
      </form>
    </section>

    <header class="app-header">
      <div>
        <h1>Retrospective</h1>
        <p>Drag cards between columns. Everyone sees updates live.</p>
      </div>
      <div>
        <div class="status" id="status">Connecting...</div>
        <div class="activity" id="activity">No recent activity</div>
        <div class="presence" id="presence">Online: 0</div>
      </div>
    </header>

    <section class="timer">
      <div class="timer-display" id="timer-display">05:00</div>
      <div class="timer-controls">
        <div class="timer-set">
          <button type="button" id="timer-dec" aria-label="Decrease minutes">-</button>
          <input id="timer-minutes" type="number" min="1" value="5" />
          <button type="button" id="timer-inc" aria-label="Increase minutes">+</button>
        </div>
        <div class="timer-actions">
          <button type="button" id="timer-start">Start</button>
          <button type="button" id="timer-stop">Stop</button>
          <button type="button" id="timer-reset">Reset</button>
        </div>
      </div>
    </section>

    <section class="composer">
      <form id="card-form">
        <input
          id="card-text"
          type="text"
          placeholder="Add a new note"
          required
        />
        <textarea
          id="card-details"
          placeholder="Add details (optional)"
          rows="3"
        ></textarea>
        <select id="card-column">
          <option value="well">Went Well</option>
          <option value="improve">To Improve</option>
          <option value="action">Actions</option>
        </select>
        <button type="submit">Add</button>
      </form>
    </section>

    <main class="board" id="board">
      <section class="column" data-column="well">
        <h2>Went Well</h2>
        <ul class="card-list" id="col-well"></ul>
      </section>
      <section class="column" data-column="improve">
        <h2>To Improve</h2>
        <ul class="card-list" id="col-improve"></ul>
      </section>
      <section class="column" data-column="action">
        <h2>Actions</h2>
        <ul class="card-list" id="col-action"></ul>
      </section>
    </main>

    <script src="https://unpkg.com/dragula@3.7.3/dist/dragula.min.js"></script>
    <script src="client.js"></script>
  </body>
</html>
